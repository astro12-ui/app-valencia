<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valencia 2028 🇪🇸</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d2e; --border: #2a2d3e;
      --primary: #6c63ff; --success: #00d4aa;
      --warning: #ffd166; --danger: #ef476f;
      --text: #e8eaf6; --muted: #8b8fa8;
      --radius: 12px; --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Layout ── */
    .page-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: 44px; background: var(--bg);
      display: flex; align-items: flex-end;
      padding: 0 max(15px, calc((100vw - 480px) / 2)) 8px;
    }
    .page-header h1 { font-size: 19px; font-weight: 700; }
    #screen-dots {
      position: fixed; top: 44px; left: 0; right: 0; z-index: 50;
      height: 20px; background: var(--bg);
      display: flex; justify-content: center; align-items: center; gap: 6px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background .25s, transform .25s; flex-shrink: 0; }
    .dot.active { background: var(--primary); transform: scale(1.4); }
    #swipe-track {
      position: fixed; top: 64px; bottom: 76px; left: 0;
      display: flex; will-change: transform; touch-action: pan-y;
    }
    .screen {
      width: 100vw; min-width: 100vw; height: 100%;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch; flex-shrink: 0;
      padding: 10px max(15px, calc((100vw - 480px) / 2)) 28px;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #12141f; border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 2px; padding: 7px 2px 11px; cursor: pointer;
      border: none; background: none; color: var(--muted);
      font-size: 9px; font-family: inherit; transition: color .2s;
      text-decoration: none;
    }
    .nav-item span:first-child { font-size: 20px; }
    .nav-item.active { color: var(--primary); }

    /* ── Cards ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; margin-bottom: 11px; }

    /* ── Progress ── */
    .progress-bar { background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 8px; height: 8px; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
    .fill-primary { background: var(--primary); }
    .fill-success { background: var(--success); }
    .fill-warning { background: var(--warning); }
    .fill-danger  { background: var(--danger); }

    /* ── Buttons ── */
    .btn { border: none; border-radius: var(--radius-sm); padding: 9px 14px; font-family: inherit; font-weight: 600; font-size: 13px; cursor: pointer; transition: opacity .15s, transform .1s; }
    .btn:active { transform: scale(0.97); }
    .btn:hover  { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-success { background: var(--success); color: #0f1117; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .btn-full { width: 100%; display: block; text-align: center; margin-top: 8px; }

    /* ── Inputs ── */
    .input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: 14px; padding: 8px 11px; width: 100%; outline: none; transition: border-color .2s; }
    .input:focus { border-color: var(--primary); }
    label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }

    /* ── Utils ── */
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .flex-center   { display: flex; align-items: center; gap: 10px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mt-4 { margin-top: 4px; } .mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; }
    .text-success { color: var(--success); } .text-warning { color: var(--warning); }
    .text-muted   { color: var(--muted); }  .text-primary { color: var(--primary); }
    .text-sm { font-size: 13px; } .text-xs { font-size: 11px; }
    .font-bold { font-weight: 700; } .font-semi { font-weight: 600; }
    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; margin: 14px 0 7px; }
    .badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 99px; font-size: 10px; font-weight: 700; }
    .badge-primary { background: #2d2a5e; color: var(--primary); }
    .badge-success { background: #0d3d33; color: var(--success); }
    .badge-warning { background: #3d2e00; color: var(--warning); }

    /* ── Home ── */
    .home-header { text-align: center; padding: 14px 0 10px; }
    .home-date    { font-size: 12px; color: var(--muted); text-transform: capitalize; letter-spacing: .3px; }
    .home-time    { font-size: 42px; font-weight: 800; letter-spacing: -2px; color: var(--text); margin: 3px 0 1px; }
    .home-greeting { font-size: 17px; font-weight: 700; margin-top: 2px; }
    .next-step-card {
      background: linear-gradient(135deg,#1e1b3a,#2d2a5e);
      border: 1px solid #3d3a7e; border-radius: var(--radius);
      padding: 14px 15px; margin-bottom: 11px;
    }
    .next-step-label { font-size: 10px; color: #a89fff; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 5px; }
    .next-step-acao  { font-size: 14px; font-weight: 700; line-height: 1.3; }
    .next-step-per   { font-size: 11px; color: #a89fff; margin-top: 4px; }

    .missions-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 15px; margin-bottom: 11px; cursor: pointer; }
    .mission-row { display: flex; align-items: center; gap: 9px; padding: 5px 0; }
    .mission-icon { font-size: 15px; }
    .mission-nome { flex: 1; font-size: 13px; }
    .mission-done { font-size: 14px; }

    .acum-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 15px; margin-bottom: 11px; }
    .acum-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4px; }
    .acum-label { font-size: 12px; color: var(--muted); }
    .acum-val   { font-size: 20px; font-weight: 800; }
    .acum-meta  { font-size: 11px; color: var(--muted); }

    /* ── Hábitos (redesign) ── */
    .hab-section-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin: 14px 0 8px; }
    .hab-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 15px; margin-bottom: 10px; transition: all .3s; }
    .hab-card.done { border-color: rgba(108,99,255,.4); background: #16133a; }
    .hab-top { display: flex; align-items: center; justify-content: space-between; }
    .hab-info { display: flex; align-items: center; gap: 10px; }
    .hab-emoji { font-size: 22px; }
    .hab-nome  { font-size: 15px; font-weight: 700; }
    .hab-sub   { font-size: 11px; color: var(--warning); margin-top: 2px; }
    .hab-body  { margin-top: 11px; }

    /* Botão toggle simples (cama, semanais) */
    .hab-btn { width: 100%; padding: 10px; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: opacity .15s, transform .1s; }
    .hab-btn:active { transform: scale(0.98); }
    .hab-btn-pend { background: rgba(108,99,255,.15); color: var(--primary); border: 1.5px solid var(--primary); }
    .hab-btn-done { background: rgba(108,99,255,.2); color: var(--primary); border: 1.5px solid var(--primary); }

    /* Barra dinâmica */
    .dyn-bar { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; margin-top: 8px; }
    .dyn-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }

    /* Steppers */
    .step-row { display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; margin: 6px 0 2px; }
    .step-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 9px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; line-height: 1.1; text-align: center; }
    .step-btn:hover { background: var(--primary); border-color: var(--primary); color: #fff; }
    .step-btn:active { transform: scale(0.88); }
    .step-btn.minus:hover { background: var(--danger); border-color: var(--danger); color: #fff; }
    .step-val { min-width: 90px; text-align: center; padding: 0 4px; }
    .step-val-num { font-size: 22px; font-weight: 800; }
    .step-val-meta { font-size: 10px; color: var(--muted); margin-top: 1px; }

    /* Círculos de missão (Home) */
    .mission-check { width: 22px; height: 22px; min-width: 22px; border-radius: 50%; border: 2px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: transparent; flex-shrink: 0; transition: all .3s; }
    .mission-check.mc-done { background: var(--primary); border-color: var(--primary); color: #fff; animation: checkPop .3s ease; }
    @keyframes checkPop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

    /* Aporte mensal (Finanças) */
    .aporte-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .aporte-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }

    /* ── Tarefas ── */
    .tag-pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; }
    .tag-vida     { background: #0d3d33; color: var(--success); }
    .tag-valencia { background: #2d2a5e; color: var(--primary); }

    .tarefa-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 15px; margin-bottom: 12px; }
    .tarefa-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .tarefa-section-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
    .tarefa-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .tarefa-item:last-child { border-bottom: none; }
    .tarefa-cb {
      width: 21px; height: 21px; min-width: 21px; border-radius: 6px;
      border: 2px solid var(--border); background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; transition: all .2s; color: transparent; flex-shrink: 0; margin-top: 1px;
    }
    .tarefa-cb:hover { border-color: var(--success); }
    .tarefa-cb.checked { background: var(--success); border-color: var(--success); color: #0f1117; }
    .tarefa-texto { flex: 1; font-size: 13px; line-height: 1.4; transition: opacity .2s; }
    .tarefa-texto.riscado { text-decoration: line-through; opacity: .4; }
    .tarefa-del { background: none; border: none; color: var(--muted); font-size: 15px; cursor: pointer; padding: 2px 4px; opacity: 0; transition: opacity .15s; flex-shrink: 0; }
    .tarefa-item:hover .tarefa-del { opacity: .5; }
    .tarefa-del:hover { opacity: 1 !important; color: var(--danger); }
    .tarefa-empty { font-size: 12px; color: var(--muted); padding: 6px 0; font-style: italic; }

    /* ── Agenda (Calendário) ── */
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .cal-mes-label { font-size: 15px; font-weight: 700; text-transform: capitalize; }
    .cal-nav-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); width: 34px; height: 34px; border-radius: 50%; font-size: 18px; cursor: pointer; line-height: 1; }
    .cal-nav-btn:active { transform: scale(0.92); }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .cal-cell { aspect-ratio: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 3px; padding: 2px; }
    .cal-cell.cal-empty { background: transparent; border: none; cursor: default; }
    .cal-cell.cal-selected { border-color: var(--primary); border-width: 2px; }
    .cal-cell.cal-passado { opacity: .4; }
    .cal-daynum { font-size: 12px; font-weight: 600; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; }
    .cal-daynum.cal-hoje { background: var(--primary); color: #fff; }
    .cal-dots { display: flex; gap: 2px; height: 6px; align-items: center; }
    .cal-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cal-dot-vida { background: #00d4aa; }
    .cal-dot-valencia { background: #6c63ff; }
    .cal-dot-trabalho { background: #ffd166; }
    .cal-more { font-size: 8px; color: var(--muted); line-height: 6px; }

    /* FAB */
    .fab {
      position: fixed; bottom: 88px; right: max(16px, calc((100vw - 480px) / 2));
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--primary); color: #fff;
      border: none; font-size: 26px; font-weight: 300; cursor: pointer;
      box-shadow: 0 4px 18px rgba(108,99,255,.5);
      z-index: 200; transition: transform .15s;
      display: none; align-items: center; justify-content: center;
    }
    .fab:active { transform: scale(0.9); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.78);
      display: none; align-items: flex-end; justify-content: center;
      padding: 0 0 76px;
    }
    .modal-overlay.open { display: flex; }
    .modal-card { background: var(--card); border: 1px solid var(--border); border-top-left-radius: var(--radius); border-top-right-radius: var(--radius); padding: 20px; width: 100%; max-width: 480px; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
    .tag-selector { display: flex; gap: 8px; margin: 10px 0 14px; }
    .tag-sel-btn { flex: 1; padding: 9px 8px; border-radius: 99px; border: 2px solid var(--border); background: transparent; color: var(--muted); font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; }
    .tag-sel-btn.sel-vida     { border-color: var(--success); color: var(--success); background: #0d3d33; }
    .tag-sel-btn.sel-valencia { border-color: var(--primary); color: var(--primary); background: #2d2a5e; }

    /* ── Countdown (Valencia) ── */
    .countdown-card {
      background: linear-gradient(135deg,#1e1b3a,#2d2a5e);
      border: 1px solid #3d3a7e; border-radius: var(--radius);
      padding: 26px 20px; text-align: center; margin-bottom: 11px;
    }
    .countdown-eyebrow { font-size: 11px; color: #a89fff; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 8px; }
    .countdown-number  { font-size: 68px; font-weight: 800; color: var(--primary); line-height: 1; }
    .countdown-label   { font-size: 13px; color: var(--muted); margin-top: 5px; letter-spacing: 1px; text-transform: uppercase; }
    .countdown-date    { font-size: 11px; color: #a89fff; margin-top: 6px; }

    /* ── Jarro card ── */
    .jarro-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; }
    .jarro-emoji { font-size: 24px; } .jarro-nome { font-size: 12px; font-weight: 600; margin-top: 4px; line-height: 1.2; }
    .jarro-valor { font-size: 17px; font-weight: 700; margin-top: 5px; } .jarro-pct { font-size: 10px; color: var(--muted); }
    .eker-bar { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
    .eker-label { font-size: 9px; color: var(--muted); width: 28px; flex-shrink: 0; }
    .eker-track { flex: 1; background: var(--border); border-radius: 99px; height: 4px; overflow: hidden; }
    .eker-fill  { height: 100%; border-radius: 99px; }
    .chart-container { max-width: 190px; margin: 6px auto 0; }

    /* ── Balde card ── */
    .balde-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 17px; margin-bottom: 12px; }
    .balde-item { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .balde-item:last-child { border-bottom: none; }
    .min-target { display: flex; gap: 4px; align-items: center; }
    .min-mark { width: 2px; height: 12px; background: var(--warning); border-radius: 1px; }

    /* ── Fin summary ── */
    .fin-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
    .fin-row:last-child { border-bottom: none; }
    .fin-row.total { font-weight: 700; font-size: 14px; }
    .fin-summary { display: flex; gap: 8px; margin-bottom: 12px; }
    .fin-sumbox { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
    .fin-sumbox-val { font-size: 15px; font-weight: 800; }
    .fin-sumbox-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

    /* ── Timeline ── */
    .timeline-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; transition: border-color .2s; overflow: hidden; }
    .timeline-main { display: flex; gap: 11px; padding: 13px 14px; cursor: pointer; }
    .timeline-main:hover { background: rgba(108,99,255,.05); }
    .timeline-item.concluido { border-color: var(--success); }
    .timeline-item.concluido .timeline-main { background: #0a1f18; }
    .timeline-item.sonho { border-color: var(--primary); }
    .timeline-item.sonho .timeline-main { background: #16133a; }
    .timeline-status { font-size: 21px; flex-shrink: 0; cursor: pointer; padding: 0 2px; }
    .timeline-periodo { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .timeline-acao    { font-size: 13px; font-weight: 500; margin-top: 2px; line-height: 1.3; }
    .timeline-expand  { padding: 10px 14px 13px 47px; border-top: 1px solid var(--border); background: rgba(0,0,0,.2); font-size: 12px; color: var(--muted); line-height: 1.5; display: none; }
    .timeline-expand.open { display: block; }
    .timeline-expand .status-btn { margin-top: 8px; font-size: 11px; }

    /* ── Metas ── */
    .meta-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; margin-bottom: 10px; }
    .chip { padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); transition: all .15s; background: var(--bg); color: var(--muted); }
    .chip.s-nao_iniciado { background: #1e2130; color: var(--muted); border-color: var(--border); }
    .chip.s-em_andamento { background: #2e2808; color: var(--warning); border-color: var(--warning); }
    .chip.s-concluido    { background: #082e22; color: var(--success); border-color: var(--success); }
    .status-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 9px; }

    /* ── Plano 90 dias ── */
    .plano-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
    .plano-header { padding: 13px 15px; display: flex; justify-content: space-between; align-items: center; }
    .plano-tema { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .plano-body { padding: 0 15px 13px; }
    .plano-action { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .plano-action:last-child { border-bottom: none; }
    .plano-action input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--success); margin-top: 2px; flex-shrink: 0; }
    .plano-action label { font-size: 13px; color: var(--text); text-transform: none; letter-spacing: 0; font-weight: 400; cursor: pointer; }
    .plano-action.done label { text-decoration: line-through; color: var(--muted); }
    .tres-numeros { background: #16133a; border: 1px solid var(--primary); border-radius: var(--radius); padding: 13px 15px; margin-bottom: 12px; }
    .tres-numeros li { font-size: 13px; margin-top: 6px; padding-left: 4px; }
    .tres-numeros li:first-child { margin-top: 0; }

    /* ── Login ── */

const KEY = 'valencia_app_data_v2';
let D = {};

function load() {
  try { const s = localStorage.getItem(KEY); D = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  catch(_) { D = JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  if (!localStorage.getItem(KEY)) save();
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(D));
  salvarCompartilhado('dados_principais', D).catch(()=>{});
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(D, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `valencia_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

  novo.data = old.data || todayStr();
  novo.espanhol.streak = old.espanhol?.streak || 0;
  if (old.espanhol?.feito)      novo.espanhol.minutos  = novo.espanhol.meta;
  if (old.agua?.copos)          novo.agua.ml            = Math.round((old.agua.copos||0) * 375);
  if (old.proteina?.gramas)     novo.proteina.gramas    = old.proteina.gramas;
  if (old.exercicio?.feito)     novo.exercicio.minutos  = old.exercicio?.minutos || novo.exercicio.meta;
  if (old.exercicio?.minutos>0) novo.exercicio.minutos  = old.exercicio.minutos;
  if (old.leitura?.feito)       novo.leitura.minutos    = novo.leitura.meta;
  if (old.cama?.feito)          novo.cama.feito          = old.cama.feito;
  if (old.fin_semanal)     { novo.fin_semanal.feito = old.fin_semanal.feito; novo.fin_semanal.ultima_semana = old.fin_semanal.ultima_semana; }
  if (old.ritual_valencia) { novo.ritual_valencia.feito = old.ritual_valencia.feito; novo.ritual_valencia.ultima_semana = old.ritual_valencia.ultima_semana; }
  return novo;
}

function loadHabitos() {
  try { H = JSON.parse(localStorage.getItem(HABITOS_KEY) || 'null') || habitosDefault(); }
  catch(_) { H = habitosDefault(); }
  // Migrar esquema antigo (feito→minutos)
  if (H.espanhol && H.espanhol.minutos === undefined) {
    H = migrateHabitos(H);
    saveHabitos();
  }
  const hoje = todayStr();
  if (H.data !== hoje) {
    arquivarHabitos(H.data, H);
    const streakAnterior = H.espanhol.streak;
    const feziOntem      = H.espanhol.minutos >= H.espanhol.meta;
    const semFin    = H.fin_semanal.ultima_semana;
    const semRit    = H.ritual_valencia.ultima_semana;
    H = habitosDefault();
    H.espanhol.streak = feziOntem ? streakAnterior + 1 : 0;
    H.fin_semanal.ultima_semana     = semFin;
    H.ritual_valencia.ultima_semana = semRit;
    saveHabitos();
  }
  const semAtual = thisWeek();
  if (H.fin_semanal.ultima_semana && H.fin_semanal.ultima_semana !== semAtual) {
    H.fin_semanal.feito = false; H.fin_semanal.ultima_semana = null;
  }
  if (H.ritual_valencia.ultima_semana && H.ritual_valencia.ultima_semana !== semAtual) {
    H.ritual_valencia.feito = false; H.ritual_valencia.ultima_semana = null;
  }
}
function saveHabitos() {
  H.data = todayStr();
  localStorage.setItem(HABITOS_KEY, JSON.stringify(H));
  salvarUsuario('habitos_diarios', H).catch(()=>{});
}

// ── Arquivamento diário
const HIST_HAB_KEY = 'historico_habitos';
const HIST_TAR_KEY = 'historico_tarefas';

function arquivarHabitos(dataStr, hData) {
  if (!dataStr || !hData.espanhol) return;
  try {
    const hist = JSON.parse(localStorage.getItem(HIST_HAB_KEY) || '{}');
    hist[dataStr] = {
      espanhol:           { minutos: hData.espanhol.minutos,  completo: hData.espanhol.minutos  >= (hData.espanhol.meta||15)   },
      agua:               { ml:      hData.agua.ml,            completo: hData.agua.ml            >= (hData.agua.meta||3000)     },
      proteina:           { gramas:  hData.proteina.gramas,    completo: hData.proteina.gramas    >= (hData.proteina.meta||110)  },
      exercicio:          { minutos: hData.exercicio.minutos,  completo: hData.exercicio.minutos  >= (hData.exercicio.meta||30)  },
      leitura:            { minutos: hData.leitura.minutos,    completo: hData.leitura.minutos    >= (hData.leitura.meta||10)    },
      cama:               { feito:   hData.cama.feito },
      financeiro_semanal: { feito:   hData.fin_semanal.feito },
      ritual_valencia:    { feito:   hData.ritual_valencia.feito }
    };
    localStorage.setItem(HIST_HAB_KEY, JSON.stringify(hist));
    salvarUsuario('historico_habitos', hist).catch(()=>{});
  } catch(_) {}
}

function arquivarTarefa(tarefa) {
  try {
    const hist = JSON.parse(localStorage.getItem(HIST_TAR_KEY) || '{}');
    const hoje = todayStr();
    if (!hist[hoje]) hist[hoje] = [];
    const now = new Date();
    hist[hoje].push({ texto: tarefa.texto, tag: tarefa.tag, concluida: true,
      hora: now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) });
    localStorage.setItem(HIST_TAR_KEY, JSON.stringify(hist));
    salvarUsuario('historico_tarefas', hist).catch(()=>{});
  } catch(_) {}
}

function arquivarFinanceiro(baldeId, mes, aporte) {
  try {
    const hist = JSON.parse(localStorage.getItem('historico_financeiro') || '{}');
    if (!hist[mes]) hist[mes] = {};
    hist[mes][baldeId] = aporte;
    localStorage.setItem('historico_financeiro', JSON.stringify(hist));
    salvarCompartilhado('historico_financeiro', hist).catch(()=>{});
  } catch(_) {}
}

async function lerCompartilhado(chave) {
  const { data, error } = await sb.from('dados_compartilhados').select('dados').eq('id', chave).single();
  if (error || !data) return null;
  return data.dados;
}
async function salvarCompartilhado(chave, dados) {
  await sb.from('dados_compartilhados')
    .upsert({ id: chave, dados: dados, updated_at: new Date().toISOString() }, { onConflict: 'id' });
}
async function lerUsuario(chave) {
  if (!currentUser) return null;
  const { data, error } = await sb.from('dados_usuario')
    .select('dados').eq('user_id', currentUser.id).eq('chave', chave).single();
  if (error || !data) return null;
  return data.dados;
}
async function salvarUsuario(chave, dados) {
  if (!currentUser) return;
  await sb.from('dados_usuario')
    .upsert({ user_id: currentUser.id, chave: chave, dados: dados, updated_at: new Date().toISOString() },
             { onConflict: 'user_id,chave' });
}

async function carregarDados() {
  // ── Dados compartilhados (baldes, financeiro, etc.)
  let dadosPrincipais = await lerCompartilhado('dados_principais');
  if (!dadosPrincipais) {
    const local = localStorage.getItem(KEY);
    dadosPrincipais = local ? JSON.parse(local) : JSON.parse(JSON.stringify(DEFAULT_DATA));
    await salvarCompartilhado('dados_principais', dadosPrincipais);
  }
  D = dadosPrincipais;
  localStorage.setItem(KEY, JSON.stringify(D));

  // ── Hábitos (por usuário)
  const habData = await lerUsuario('habitos_diarios');
  if (habData) {
    localStorage.setItem(HABITOS_KEY, JSON.stringify(habData));
  } else {
    const localHab = localStorage.getItem(HABITOS_KEY);
    if (localHab) await salvarUsuario('habitos_diarios', JSON.parse(localHab)).catch(()=>{});
  }

  // ── Tarefas Valencia (compartilhadas)
  let tarValencia = await lerCompartilhado('tarefas_valencia');
  if (tarValencia === null) {
    const localT = localStorage.getItem(TAREFAS_KEY);
    tarValencia = localT ? JSON.parse(localT).filter(t => t.tag === 'valencia') : [];
    await salvarCompartilhado('tarefas_valencia', tarValencia);
  }

  // ── Tarefas Vida (por usuário)
  let tarVida = await lerUsuario('tarefas_vida');
  if (tarVida === null) {
    const localT = localStorage.getItem(TAREFAS_KEY);
    tarVida = localT ? JSON.parse(localT).filter(t => t.tag === 'vida') : [];
    await salvarUsuario('tarefas_vida', tarVida).catch(()=>{});
  }

  T = [...(tarVida || []), ...(tarValencia || [])];
  localStorage.setItem(TAREFAS_KEY, JSON.stringify(T));
}

// ── Realtime: sincronizar dados compartilhados entre dispositivos
function initRealtime() {
  sb.channel('shared_updates')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'dados_compartilhados' },
      payload => {
        const row = payload.new;
        if (!row) return;
        if (row.id === 'dados_principais') {
          D = row.dados;
          localStorage.setItem(KEY, JSON.stringify(D));
          const sid = SCREEN_ORDER[currentIdx];
          if (ROUTES[sid]) ROUTES[sid].render();
          mostrarToast('Dados atualizados', 'ok');
        }
        if (row.id === 'tarefas_valencia') {
          const vida = T.filter(t => t.tag === 'vida');
          T = [...vida, ...(row.dados || [])];
          localStorage.setItem(TAREFAS_KEY, JSON.stringify(T));
          renderAtual();
        }
      })
    .subscribe();
}

function mesAtual() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function nomeMes(mesStr) {
  if (!mesStr) return nomeMes(mesAtual());
  const [y,m] = mesStr.split('-');
  const ns = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${ns[parseInt(m)]} ${y}`;
}

function checkMesAporte() {
  if (!D.baldes_valencia) return;
  const mes = mesAtual();
  const baldes = [D.baldes_valencia.balde_euros, D.baldes_valencia.balde_viagem, D.baldes_valencia.balde_emergencia];
  const metas  = { EUROS:1976, VIAGEM:1444, EMERGENCIA:228 };
  let changed = false;
  baldes.forEach(bd => {
    if (bd.aporte_mes_atual === undefined) { bd.aporte_mes_atual = 0; changed = true; }
    if (!bd.meta_aporte_mensal) { bd.meta_aporte_mensal = metas[bd.id] || 0; changed = true; }
    if (!bd.mes_corrente) { bd.mes_corrente = mes; changed = true; }
    else if (bd.mes_corrente !== mes) {
      arquivarFinanceiro(bd.id, bd.mes_corrente, bd.aporte_mes_atual);
      bd.aporte_mes_atual = 0; bd.mes_corrente = mes; changed = true;
    }
  });
  if (changed) save();
}

function checkMesOrcamento() {
  if (!D.orcamento) return;
  const mes = mesAtual();
  let changed = false;
  D.orcamento.variaveis.forEach(v => {
    if (!v.mes_corrente) { v.mes_corrente = mes; changed = true; }
    else if (v.mes_corrente !== mes) { v.real_mes = 0; v.mes_corrente = mes; changed = true; }
  });
  if (changed) save();
}

function adicionarGasto(id) {
  const inp = document.getElementById('gasto-' + id);
  if (!inp || !D.orcamento) return;
  const val = parseFloat(inp.value) || 0;
  if (val <= 0) return;
  const v = D.orcamento.variaveis.find(x => x.id === id);
  if (!v) return;
  v.real_mes = Math.round(((v.real_mes||0) + val) * 100) / 100;
  save(); inp.value = ''; renderFinancas();
}

function updatePatrimonio(pessoa, itemId, val) {
  if (!D.patrimonio || !D.patrimonio[pessoa]) return;
  const item = D.patrimonio[pessoa].find(x => x.id === itemId);
  if (item) { item.valor = parseFloat(val) || 0; save(); }
}

function adicionarAporte(id) {
  const inp = document.getElementById('aporte-input-' + id);
  if (!inp) return;
  const val = parseFloat(inp.value) || 0;
  if (val <= 0) return;
  const b  = D.baldes_valencia;
  const bd = id==='EUROS' ? b.balde_euros : id==='VIAGEM' ? b.balde_viagem : b.balde_emergencia;
  if (!bd) return;
  bd.aporte_mes_atual = (bd.aporte_mes_atual||0) + val;
  const cx = D.financeiro.cotacao_eur_brl;
  const addSaldo = (id==='EUROS') ? Math.round((val/cx)*100)/100 : val;
  bd.saldo_atual = Math.round((bd.saldo_atual + addSaldo)*100)/100;
  if (id==='EUROS')      { const m = D.metas.find(x=>x.id==='capital_chegada');   if(m) m.valor_atual=bd.saldo_atual; }
  if (id==='VIAGEM')     { const m = D.metas.find(x=>x.id==='balde_viagem_meta'); if(m) m.valor_atual=bd.saldo_atual; }
  if (id==='EMERGENCIA') { const m = D.metas.find(x=>x.id==='reserva_6meses');    if(m) m.valor_atual=bd.saldo_atual; }
  save(); inp.value = ''; renderFinancas();
}

const COTACAO_KEY = 'cotacao_data_v2';

function cotacaoLabel() {
  const cx   = D.financeiro.cotacao_eur_brl;
  const last  = localStorage.getItem(COTACAO_KEY);
  const hoje  = new Date().toDateString();
  const ontem = new Date(Date.now() - 86400000).toDateString();
  let quando;
  if (!last)               quando = 'manual';
  else if (last === hoje)  quando = 'atualizado hoje';
  else if (last === ontem) quando = 'atualizado ontem';
  else                     quando = `atualizado ${new Date(last).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}`;
  return `€1 = R$ ${cx.toFixed(4).replace('.',',')} · ${quando}`;
}

async function atualizarCotacao() {
  const hoje = new Date().toDateString();
  const valorArredondado = Number.isInteger(D.financeiro.cotacao_eur_brl * 100);
  const jaAtualizouHoje  = localStorage.getItem(COTACAO_KEY) === hoje;
  if (jaAtualizouHoje && !valorArredondado) return;
  try {
    const res  = await fetch('https://open.er-api.com/v6/latest/EUR');
    const data = await res.json();
    const rBRL = data.rates.BRL;
    const rUSD = data.rates.USD;
    const rJPY = data.rates.JPY;
    if (!rBRL || isNaN(rBRL)) return;
    D.financeiro.cotacao_eur_brl = rBRL;
    if (rUSD) D.financeiro.cotacao_usd_brl = Math.round((rBRL / rUSD) * 10000) / 10000;
    if (rJPY) D.financeiro.cotacao_jpy_brl = Math.round((rBRL / rJPY) * 100000) / 100000;
    save();
    localStorage.setItem(COTACAO_KEY, hoje);
    const sid = SCREEN_ORDER[currentIdx];
    if (sid === 'home')     renderHome();
    if (sid === 'financas') renderFinancas();
  } catch(e) {
    console.log('Cotação: API indisponível, mantendo valor salvo. Erro:', e.message);
  }
}

//  UTILS
// ═══════════════════════════════════════════════════
function fmtBRL(v) { return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtEUR(v) { return '€' + Number(v).toLocaleString('pt-BR',  {minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtCur(v, m) { return m === 'EUR' ? fmtEUR(v) : fmtBRL(v); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function daysLeft(dateStr) {
  const t = new Date(dateStr + 'T00:00:00');
  const n = new Date(); n.setHours(0,0,0,0);
  return Math.ceil((t - n) / 86400000);
}
function fmtDate(s) {
  const [y,m,d] = s.split('-');
  const mo = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${d}/${mo[+m-1]}/${y}`;
}
function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const y1 = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return `${d.getUTCFullYear()}-W${Math.ceil(((d - y1) / 86400000 + 1) / 7)}`;
}
function todayStr()  { return new Date().toISOString().slice(0,10); }
function thisWeek()  { return isoWeek(new Date()); }
function pct(cur, total) { if (!total) return 0; return Math.min(100, Math.round((cur / total) * 100)); }
function dynBarColor(p) {
  if (p <= 33) return 'var(--danger)';
  if (p <= 66) return 'var(--warning)';
  return 'var(--success)';
}
function progBar(p, h) {
  const col = p >= 67 ? 'var(--success)' : p >= 34 ? 'var(--warning)' : 'var(--danger)';
  return `<div class="progress-bar" style="height:${h||8}px"><div class="progress-fill" style="width:${p}%;background:${col}"></div></div>`;
}
function mesesAteMeta(saldo, aporte, meta) {
  const falta = meta - saldo;
  if (falta <= 0) return 0;
  if (!aporte) return null;
  return Math.ceil(falta / aporte);
}

// ═══════════════════════════════════════════════════
//  ROUTER  (swipe-based, 5 telas)
// ═══════════════════════════════════════════════════
const ROUTES = {
  home:     { title: '🏠 Home',      render: renderHome     },
  habitos:  { title: '✅ Hábitos',   render: renderHabitos  },
  tarefas:  { title: '📋 Tarefas',   render: renderTarefas  },
  agenda:   { title: '📅 Agenda',    render: renderAgenda   },
  financas: { title: '💶 Finanças',  render: renderFinancas },
  valencia: { title: '✈️ Valencia',  render: renderValencia }
};
const SCREEN_ORDER = ['home','habitos','tarefas','agenda','financas','valencia'];
let chart = null;
let expandedItems = new Set();
let currentIdx = 0;
let clockInterval = null;

function goToScreen(idx, animate) {
  if (animate === undefined) animate = true;
  idx = Math.max(0, Math.min(SCREEN_ORDER.length - 1, idx));
  const sid = SCREEN_ORDER[idx];

  if (chart && sid !== 'financas') { chart.destroy(); chart = null; }
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }

  currentIdx = idx;

  const track = document.getElementById('swipe-track');
  if (track) {
    track.style.transition = animate
      ? 'transform 0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94)'
      : 'none';
    track.style.transform = `translateX(${-idx * window.innerWidth}px)`;
  }

  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  history.replaceState(null, '', '#' + sid);

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + sid);
  if (nav) nav.classList.add('active');

  const r = ROUTES[sid];
  if (r) { document.getElementById('page-title').textContent = r.title; r.render(); }

  // FAB: só na tela de tarefas
  const fab = document.getElementById('fab-tarefa');
  if (fab) fab.style.display = sid === 'tarefas' ? 'flex' : 'none';

  const screenEl = document.getElementById('screen-' + sid);
  if (screenEl) screenEl.scrollTop = 0;

  if (sid === 'home') startClock();
}

function route() {
  const id  = (location.hash || '#home').replace('#','');
  const idx = SCREEN_ORDER.indexOf(id);
  goToScreen(idx >= 0 ? idx : 0);
}

function initDots() {
  const el = document.getElementById('screen-dots');
  if (!el) return;
  el.innerHTML = SCREEN_ORDER.map((_,i) =>
    `<div class="dot${i === currentIdx ? ' active' : ''}"></div>`
  ).join('');
}

function initSwipe() {
  const track = document.getElementById('swipe-track');
  if (!track) return;
  let startX = 0, startY = 0, active = false, dir = null;
  function onStart(x,y) { startX=x; startY=y; active=true; dir=null; track.style.transition='none'; }
  function onMove(x,y,e) {
    if (!active) return;
    const dx = x-startX, dy = y-startY;
    if (!dir) {
      if (Math.abs(dx)>Math.abs(dy)+4)      dir='h';
      else if (Math.abs(dy)>Math.abs(dx)+4) dir='v';
      else return;
    }
    if (dir !== 'h') return;
    if (e) e.preventDefault();
    const base = -currentIdx * window.innerWidth;
    const resist = (currentIdx===0 && dx>0) || (currentIdx===SCREEN_ORDER.length-1 && dx<0);
    track.style.transform = `translateX(${base + (resist ? dx*.2 : dx)}px)`;
  }
  function onEnd(x) {
    if (!active) return; active=false;
    if (dir !== 'h') return;
    const dx = x - startX;
    if      (dx < -50 && currentIdx < SCREEN_ORDER.length-1) goToScreen(currentIdx+1);
    else if (dx >  50 && currentIdx > 0)                      goToScreen(currentIdx-1);
    else {
      track.style.transition = 'transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      track.style.transform  = `translateX(${-currentIdx*window.innerWidth}px)`;
    }
    dir = null;
  }
  track.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
  track.addEventListener('touchmove',  e => onMove(e.touches[0].clientX, e.touches[0].clientY, e), {passive:false});
  track.addEventListener('touchend',   e => onEnd(e.changedTouches[0].clientX), {passive:true});
  let mouseDown = false;
  track.addEventListener('mousedown', e => { if(e.button!==0)return; mouseDown=true; onStart(e.clientX,e.clientY); e.preventDefault(); });
  document.addEventListener('mousemove', e => { if(mouseDown) onMove(e.clientX,e.clientY,null); });
  document.addEventListener('mouseup',   e => { if(mouseDown){ mouseDown=false; onEnd(e.clientX); } });
}

function startClock() {
  updateClock();
  clockInterval = setInterval(updateClock, 1000);
}
function updateClock() {
  const el = document.getElementById('home-time');
  if (!el) { clearInterval(clockInterval); clockInterval = null; return; }
  const now = new Date();
  el.textContent = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
function nomeUsuario(email) {
  if (!email) return 'Você';
  const mapa = { 'guilherme.batista23@outlook.com': 'Guilherme' };
  if (mapa[email.toLowerCase()]) return mapa[email.toLowerCase()];
  const u = email.split('@')[0].replace(/[._-].*$/, '');
  return u.charAt(0).toUpperCase() + u.slice(1);
}
function greeting() {
  const nome = currentUser ? nomeUsuario(currentUser.email) : 'Você';
  const h = new Date().getHours();
  if (h < 12) return `Bom dia, ${nome} ☀️`;
  if (h < 18) return `Boa tarde, ${nome} 🌤️`;
  return `Boa noite, ${nome} 🌙`;
}
function dataPorExtenso() {
  return new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}

function dynBarCol(val, meta, col) {
  const p = Math.min(100, Math.round((val/meta)*100));
  return `<div class="dyn-bar"><div class="dyn-fill" style="width:${p}%;background:${col}"></div></div>`;
}
function stepper(minusBtns, plusBtns, valHtml, onMinusFns, onPlusFns) {
  const mBtns = minusBtns.map((lbl,i) => `<button class="step-btn minus" onclick="${onMinusFns[i]}">${lbl}</button>`).join('');
  const pBtns = plusBtns.map((lbl,i)  => `<button class="step-btn"       onclick="${onPlusFns[i]}">${lbl}</button>`).join('');
  return `<div class="step-row">${mBtns}<div class="step-val">${valHtml}</div>${pBtns}</div>`;
}

const MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS_SEMANA_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function fmtDateShort(s) { const [,m,d] = s.split('-'); return `${d}/${m}`; }
function dateStrYMD(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function mudarMesCalendario(delta) {
  calMes.setMonth(calMes.getMonth() + delta);
  renderAgenda();
}
function selecionarDiaCalendario(ds) {
  diaSelecionado = ds;
  renderAgenda();
}

function renderAgenda() {
  const el = document.getElementById('screen-agenda');
  const y = calMes.getFullYear();
  const m = calMes.getMonth();
  const diasNoMes = new Date(y, m+1, 0).getDate();
  const diaSemanaInicio = new Date(y, m, 1).getDay();
  const hojeStr = todayStr();

  const tarefasPorDia = {};
  T.forEach(t => {
    if (t.data && !t.feita) {
      if (!tarefasPorDia[t.data]) tarefasPorDia[t.data] = [];
      tarefasPorDia[t.data].push(t.tag);
    }
  });

  let celulas = '';
  for (let i=0; i<diaSemanaInicio; i++) celulas += `<div class="cal-cell cal-empty"></div>`;
  for (let d=1; d<=diasNoMes; d++) {
    const ds = dateStrYMD(y,m,d);
    const isHoje = ds === hojeStr;
    const isPassado = ds < hojeStr;
    const isSelecionado = ds === diaSelecionado;
    const tags = tarefasPorDia[ds] || [];
    const dotsHtml = tags.slice(0,3).map(tag => `<span class="cal-dot cal-dot-${tag}"></span>`).join('')
      + (tags.length > 3 ? '<span class="cal-more">···</span>' : '');
    celulas += `
      <div class="cal-cell${isSelecionado?' cal-selected':''}${isPassado?' cal-passado':''}" onclick="selecionarDiaCalendario('${ds}')">
        <div class="cal-daynum${isHoje?' cal-hoje':''}">${d}</div>
        <div class="cal-dots">${dotsHtml}</div>
      </div>`;
  }

  const tarefasDoDia = T.filter(t => t.data === diaSelecionado);
  const [, mmSel, ddSel] = diaSelecionado.split('-');
  const tituloDia = `${parseInt(ddSel)} de ${MESES_PT[parseInt(mmSel)-1].toLowerCase()}`;

  function diaTarefaItem(t) {
    return `
    <div class="tarefa-item" id="ti-${t.id}">
      <div class="tarefa-cb${t.feita ? ' checked' : ''}" onclick="toggleTarefa('${t.id}')">${t.feita ? '✓' : ''}</div>
      <span class="tag-pill tag-${t.tag}" style="margin-right:6px;flex-shrink:0">${t.tag==='vida'?'🏠':'🇪🇸'}</span>
      <span class="tarefa-texto${t.feita ? ' riscado' : ''}">${escHtml(t.texto)}</span>
      <button class="tarefa-del" onclick="excluirTarefa('${t.id}')">🗑</button>
    </div>`;
  }

  el.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="mudarMesCalendario(-1)">‹</button>
      <div class="cal-mes-label">${MESES_PT[m]} ${y}</div>
      <button class="cal-nav-btn" onclick="mudarMesCalendario(1)">›</button>
    </div>
    <div class="cal-weekdays">${DIAS_SEMANA_PT.map(d=>`<div>${d}</div>`).join('')}</div>
    <div class="cal-grid">${celulas}</div>

    <div class="tarefa-section" style="margin-top:16px">
      <div class="tarefa-section-title" style="margin-bottom:10px;justify-content:space-between;width:100%">
        <span>Tarefas — ${tituloDia}</span>
        <button class="btn btn-primary btn-sm" onclick="abrirModalParaData('${diaSelecionado}')">+ Adicionar</button>
      </div>
      ${tarefasDoDia.length ? tarefasDoDia.map(diaTarefaItem).join('') : '<div class="tarefa-empty">Nenhuma tarefa para este dia ✨</div>'}
    </div>
  `;
}

// ═══════════════════════════════════════════════════
//  TELA 4 — FINANÇAS
// ═══════════════════════════════════════════════════
const JARRO_COLORS = ['#ef476f','#6c63ff','#00b4d8','#00d4aa','#ffd166','#ff9f43'];
const BALDE_LABELS = { EUROS:'💶 Balde Euros', VIAGEM:'✈️ Balde Viagem', EMERGENCIA:'🛡️ Emergência' };

function renderFinancas() {
  const el     = document.getElementById('screen-financas');
  const fin    = D.financeiro;
  const cx     = fin.cotacao_eur_brl;
  const cxUSD  = fin.cotacao_usd_brl || 5.70;
  const cxJPY  = fin.cotacao_jpy_brl || 0.038;
  const b      = D.baldes_valencia;
  const jarros = D.seis_jarros.jarros;
  const orc    = D.orcamento;
  const pat    = D.patrimonio;

  const renda       = fin.renda_mensal.total;
  const totalFixos  = orc ? orc.fixos.reduce((s,f)=>s+f.valor,0) : 0;
  const totalVarReal= orc ? orc.variaveis.reduce((s,v)=>s+(v.real_mes||0),0) : 0;
  const sobra       = renda - totalFixos - totalVarReal;
  const mesesR      = Math.max(0, Math.ceil(daysLeft(D.perfil.data_embarque_alvo) / 30));
  const eurosProj   = b.balde_euros.saldo_atual + (b.balde_euros.aporte_mensal / cx) * mesesR;

  // ── Orçamento: fixos
  const fixosHtml = orc ? `
    <div class="card" style="margin-bottom:8px">
      <div class="flex-between" style="margin-bottom:10px">
        <div class="font-semi" style="font-size:13px">Fixos mensais</div>
        <div class="font-semi" style="color:var(--danger)">${fmtBRL(totalFixos)}/mês</div>
      </div>
      ${orc.fixos.map(f=>`
        <div class="orc-fixo-item"><span>${f.nome}</span><span class="font-semi" style="color:var(--muted)">${fmtBRL(f.valor)}</span></div>`).join('')}
    </div>` : '';

  // ── Orçamento: variáveis
  const variaveisHtml = orc ? orc.variaveis.map(v => {
    const p   = v.meta > 0 ? Math.min(200, Math.round(((v.real_mes||0)/v.meta)*100)) : 0;
    const cor = p<=70?'var(--success)':p<=90?'var(--warning)':p<=100?'#ff9f43':'var(--danger)';
    const falta = Math.max(0, v.meta-(v.real_mes||0));
    const estouro = (v.real_mes||0) > v.meta;
    return `
    <div class="card" style="margin-bottom:8px;border-left:3px solid ${cor}">
      <div class="flex-between" style="margin-bottom:6px">
        <div class="font-semi">${v.emoji} ${v.nome}</div>
        <div class="text-xs text-muted">Meta: ${fmtBRL(v.meta)}</div>
      </div>
      <div class="flex-between mt-4">
        <div style="font-size:18px;font-weight:800;color:${cor}">${fmtBRL(v.real_mes||0)}</div>
        <div class="text-xs" style="color:${cor};font-weight:700">${p}%</div>
      </div>
      <div class="progress-bar" style="height:7px;margin:6px 0">
        <div class="progress-fill" style="width:${Math.min(100,p)}%;background:${cor}"></div>
      </div>
      <div class="flex-between">
        <span class="text-xs" style="color:${estouro?'var(--danger)':'var(--muted)'}">
          ${estouro?'⚠️ Estourou '+fmtBRL((v.real_mes||0)-v.meta):'Falta '+fmtBRL(falta)}
        </span>
        <span class="text-xs text-muted">${nomeMes(v.mes_corrente)}</span>
      </div>
      <div class="orc-gasto-row">
        <input id="gasto-${v.id}" class="input" type="number" placeholder="+ quanto gastou?" style="font-size:13px;padding:7px 10px">
        <button class="btn btn-primary btn-sm" onclick="adicionarGasto('${v.id}')">+ Add</button>
      </div>
    </div>`;
  }).join('') : '';

  // ── Baldes
  const baldesHtml = [b.balde_euros, b.balde_viagem, b.balde_emergencia].map(bd => {
    const isEUR = bd.moeda === 'EUR';
    const aporteLocal = isEUR ? bd.aporte_mensal / cx : bd.aporte_mensal;
    const p = pct(bd.saldo_atual, bd.meta);
    const meses = mesesAteMeta(bd.saldo_atual, aporteLocal, bd.meta);
    const fmtM  = isEUR ? fmtEUR(bd.meta) : fmtBRL(bd.meta);
    const aporteStr = isEUR
      ? `${fmtBRL(bd.aporte_mensal)}/mês ≈ ${fmtEUR(Math.round(aporteLocal))}`
      : bd.aporte_mensal > 0 ? `${fmtBRL(bd.aporte_mensal)}/mês` : 'sem aporte automático';
    const projText = meses === 0 ? '✅ Meta atingida!'
      : meses != null ? `⏱️ Meta em ~${meses} meses` : '';
    const itensHtml = bd.itens_cobertos ? `
      <div class="text-xs text-muted font-semi" style="margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px">Itens cobertos</div>
      ${bd.itens_cobertos.map(it=>`<div class="balde-item"><span>${it.item}</span><span class="font-semi">${fmtBRL(it.valor)}</span></div>`).join('')}` : '';
    const minHtml = bd.meta_minima ? (() => {
      const atingiu = bd.saldo_atual >= bd.meta_minima;
      return `<div class="min-target mt-8"><div class="min-mark"></div><div class="text-xs text-muted">Meta mínima ${fmtBRL(bd.meta_minima)}: <span style="color:${atingiu?'var(--success)':'var(--warning)'};font-weight:600">${atingiu?'✅ Atingida':pct(bd.saldo_atual,bd.meta_minima)+'%'}</span></div></div>`;
    })() : '';
    return `
    <div class="balde-card">
      <div class="flex-between" style="margin-bottom:10px">
        <div class="flex-center">
          <span style="font-size:28px">${bd.emoji}</span>
          <div>
            <div class="font-semi">${bd.nome}</div>
            <div class="text-xs text-muted mt-4">📍 ${bd.onde}</div>
            <div class="text-xs text-muted">${aporteStr}</div>
          </div>
        </div>
        <div style="text-align:right"><div class="text-xs text-muted">meta</div><div class="font-semi">${fmtM}</div></div>
      </div>
      <label>Saldo atual (${bd.moeda})</label>
      <input class="input" type="number" step="0.01" value="${bd.saldo_atual}"
        style="font-size:18px;font-weight:700;color:var(--success)"
        onchange="updateBaldeSaldo('${bd.id}', this.value)">
      ${progBar(p, 10)}
      <div class="flex-between mt-4">
        <span class="text-xs text-muted">${p}% atingido</span>
        <span class="text-xs" style="color:var(--warning)">${projText}</span>
      </div>
      ${minHtml}${itensHtml}
      ${bd.instrucao ? `<div class="text-xs text-muted" style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">💡 ${bd.instrucao}</div>` : ''}
      <div class="aporte-section">
        <div class="text-xs font-semi" style="color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">📅 Mês de ${nomeMes(bd.mes_corrente)}</div>
        <div class="flex-between" style="margin-bottom:4px">
          <span class="text-xs text-muted">Aportado: ${fmtBRL(bd.aporte_mes_atual||0)}${isEUR?' ≈ '+fmtEUR(Math.round((bd.aporte_mes_atual||0)/cx)):''}</span>
          <span class="text-xs text-muted">meta ${fmtBRL(bd.meta_aporte_mensal||0)} · ${pct(bd.aporte_mes_atual||0,bd.meta_aporte_mensal||1)}%</span>
        </div>
        ${progBar(pct(bd.aporte_mes_atual||0,bd.meta_aporte_mensal||1),6)}
        <div class="aporte-row">
          <input id="aporte-input-${bd.id}" class="input" type="number" placeholder="R$ valor do aporte" style="font-size:13px;padding:7px 10px">
          <button class="btn btn-primary btn-sm" onclick="adicionarAporte('${bd.id}')">+ Adicionar</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // ── Patrimônio
  function patLabel(item) {
    if (item.moeda==='EUR') return `€${Number(item.valor).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
    if (item.moeda==='USD') return `$${Number(item.valor).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
    if (item.moeda==='JPY') return `¥${Number(item.valor).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0})}`;
    return fmtBRL(item.valor);
  }
  function itemBRL(item) {
    if (item.moeda==='BRL') return item.valor;
    if (item.moeda==='EUR') return item.valor * cx;
    if (item.moeda==='USD') return item.valor * cxUSD;
    if (item.moeda==='JPY') return item.valor * cxJPY;
    return item.valor;
  }
  let totalPat = 0;
  function patRow(pessoa, item) {
    const brl = itemBRL(item);
    totalPat += brl;
    const conv = item.moeda!=='BRL' ? `<span class="text-xs text-muted"> ≈ ${fmtBRL(Math.round(brl))}</span>` : '';
    return `<div class="pat-conta">
      <span>${item.nome}</span>
      <div class="pat-val-wrap">
        <div class="font-semi">${patLabel(item)}${conv}</div>
        <input type="number" step="0.01" class="input pat-input" value="${item.valor}"
          onchange="updatePatrimonio('${pessoa}','${item.id}',this.value)">
      </div>
    </div>`;
  }
  const patHtml = pat ? `
    <div class="text-xs text-muted font-semi" style="text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Guilherme</div>
    ${pat.guilherme.map(item=>patRow('guilherme',item)).join('')}
    <div class="text-xs text-muted font-semi" style="text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px">Esposa</div>
    ${pat.esposa.map(item=>patRow('esposa',item)).join('')}
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
      <div class="flex-between">
        <div class="text-sm text-muted">Total estimado em BRL</div>
        <div style="font-size:20px;font-weight:800;color:var(--success)">${fmtBRL(Math.round(totalPat))}</div>
      </div>
      <div class="text-xs text-muted" style="margin-top:4px">€1=R$${cx.toFixed(4)} · $1=R$${cxUSD.toFixed(4)} · ¥1=R$${cxJPY.toFixed(5)}</div>
    </div>` : '';

  // ── Jarros
  const jarrosHtml = jarros.map((j,i) => {
    const badge = j.alimenta_balde ? `<div class="badge badge-primary mt-4">↗ ${BALDE_LABELS[j.alimenta_balde]}</div>` : '';
    const ekerPct = Math.round(j.percentual_eker * 100);
    const meuPct  = Math.round(j.percentual * 100);
    return `
    <div class="jarro-card" style="border-top:3px solid ${JARRO_COLORS[i]}">
      <div class="jarro-emoji">${j.emoji}</div>
      <div class="jarro-nome">${j.nome}</div>
      <div class="jarro-valor">${fmtBRL(j.valor_mensal)}</div>
      <div class="jarro-pct">${meuPct}% da renda</div>
      <div class="eker-bar"><span class="eker-label">Meu</span><div class="eker-track"><div class="eker-fill fill-primary" style="width:${meuPct*2}%"></div></div></div>
      <div class="eker-bar"><span class="eker-label">Eker</span><div class="eker-track"><div class="eker-fill" style="width:${ekerPct*2}%;background:var(--muted)"></div></div></div>
      ${badge}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="fin-summary">
      <div class="fin-sumbox">
        <div class="fin-sumbox-val" style="color:var(--success)">${fmtBRL(renda)}</div>
        <div class="fin-sumbox-lbl">Renda</div>
      </div>
      <div class="fin-sumbox">
        <div class="fin-sumbox-val" style="color:var(--danger)">${fmtBRL(Math.round(totalFixos+totalVarReal))}</div>
        <div class="fin-sumbox-lbl">Gastos</div>
      </div>
      <div class="fin-sumbox">
        <div class="fin-sumbox-val" style="color:${sobra>=0?'var(--primary)':'var(--danger)'}">${fmtBRL(Math.round(sobra))}</div>
        <div class="fin-sumbox-lbl">Sobra</div>
      </div>
    </div>

    <div class="section-title">Orçamento</div>
    ${fixosHtml}
    <div class="section-title" style="margin-top:4px">Variáveis</div>
    ${variaveisHtml}

    <div class="section-title">Baldes Valencia</div>
    ${baldesHtml}

    <div class="card" style="background:linear-gradient(135deg,#0d231e,#1a2e25);border-color:var(--success);margin-bottom:12px">
      <div class="text-sm font-semi" style="color:var(--success)">📊 Capital projetado na chegada</div>
      <div style="font-size:28px;font-weight:800;color:var(--success);margin:6px 0">${fmtEUR(Math.round(eurosProj))}</div>
      <div class="text-xs text-muted">${mesesR} meses · câmbio R$${cx.toFixed(4)}/€ · aporte ${fmtBRL(b.balde_euros.aporte_mensal)}/mês</div>
    </div>

    <div class="section-title">💰 Patrimônio Atual</div>
    <div class="card" style="margin-bottom:12px">${patHtml}</div>

    <div class="section-title">Jarros (Método Eker)</div>
    <div class="card" style="padding:12px">
      <div>
        <div class="fin-row"><span>Guilherme</span><span class="font-semi">${fmtBRL(fin.renda_mensal.guilherme)}</span></div>
        <div class="fin-row"><span>Esposa</span><span class="font-semi">${fmtBRL(fin.renda_mensal.esposa)}</span></div>
        <div class="fin-row total"><span>Total</span><span style="color:var(--success)">${fmtBRL(renda)}</span></div>
      </div>
      <div class="grid-2" style="margin-top:10px">
        <div><label>Renda total (R$)</label><input class="input" type="number" value="${renda}" onchange="updateRenda(this.value)"></div>
        <div><label>Cotação €/R$</label><input class="input" type="number" step="0.0001" value="${Number(cx).toFixed(4)}" onchange="updateCotacao(this.value)"></div>
      </div>
    </div>
    <div class="card">
      <div class="text-xs text-muted font-semi" style="text-align:center;margin-bottom:2px">Distribuição dos Jarros</div>
      <div class="chart-container"><canvas id="donut-chart"></canvas></div>
    </div>
    <div class="grid-2">${jarrosHtml}</div>
    <button class="btn btn-outline btn-full" style="margin-top:12px" onclick="exportJSON()">📥 Exportar dados (backup JSON)</button>
  `;

  setTimeout(() => {
    const ctx = document.getElementById('donut-chart');
    if (!ctx) return;
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: jarros.map(j => j.nome),
        datasets: [{ data: jarros.map(j => Math.round(j.percentual*100)), backgroundColor: JARRO_COLORS, borderWidth: 2, borderColor: '#1a1d2e' }]
      },
      options: { cutout:'62%', plugins: { legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw}%`}} } }
    });
  }, 50);
}

function updateRenda(v) {
  const r = parseFloat(v) || 0;
  D.financeiro.renda_mensal.total = r;
  D.seis_jarros.jarros.forEach(j => { j.valor_mensal = Math.round(j.percentual * r); });
  save(); renderFinancas();
}
function updateCotacao(v) {
  D.financeiro.cotacao_eur_brl = parseFloat(v) || 6.5;
  save(); renderFinancas();
}
function updateBaldeSaldo(id, v) {
  const val = parseFloat(v) || 0;
  const b = D.baldes_valencia;
  if (id==='EUROS')      b.balde_euros.saldo_atual      = val;
  if (id==='VIAGEM')     b.balde_viagem.saldo_atual     = val;
  if (id==='EMERGENCIA') b.balde_emergencia.saldo_atual = val;
  if (id==='EUROS')      { const m = D.metas.find(m=>m.id==='capital_chegada');   if(m) m.valor_atual=val; }
  if (id==='VIAGEM')     { const m = D.metas.find(m=>m.id==='balde_viagem_meta'); if(m) m.valor_atual=val; }
  if (id==='EMERGENCIA') { const m = D.metas.find(m=>m.id==='reserva_6meses');    if(m) m.valor_atual=val; }
  save();
}

// ═══════════════════════════════════════════════════
//  TELA 5 — VALENCIA
// ═══════════════════════════════════════════════════
const STATUS_CYCLE      = { pendente:'concluido', concluido:'sonho', sonho:'pendente' };
const STATUS_ICON       = { pendente:'⏳', concluido:'✅', sonho:'✨' };
const STATUS_NEXT_LABEL = { pendente:'Marcar concluído', concluido:'Marcar como sonho', sonho:'Voltar a pendente' };
const STATUS_LABELS     = { nao_iniciado:'⚪ Não iniciado', em_andamento:'🟡 Em andamento', concluido:'🟢 Concluído' };

function renderValencia() {
  const el   = document.getElementById('screen-valencia');
  const days = daysLeft(D.perfil.data_embarque_alvo);
  const p    = D.plano_90_dias;

  // Plano 90 dias
  const PLANO_MONTH_NUMS = [5,6,7];
  const PLANO_YEAR = 2026;
  const now = new Date();
  const mesesHtml = p.meses.map((mes, mi) => {
    const isActive = (now.getFullYear()===PLANO_YEAR && now.getMonth()===PLANO_MONTH_NUMS[mi]);
    const isDone   = (now.getFullYear()>PLANO_YEAR  || (now.getFullYear()===PLANO_YEAR && now.getMonth()>PLANO_MONTH_NUMS[mi]));
    const concluidas = mes.concluidas || [];
    const pMes = pct(concluidas.length, mes.acoes.length);
    return `
    <div class="plano-card" style="${isActive?'border-color:var(--primary)':isDone?'border-color:var(--success);opacity:.7':''}">
      <div class="plano-header">
        <div>
          <div class="font-semi">${isActive?'▶ ':isDone?'✅ ':''}${mes.mes}</div>
          <div class="plano-tema">${mes.tema}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:15px;font-weight:700;color:${pMes===100?'var(--success)':'var(--text)'}">${concluidas.length}/${mes.acoes.length}</div>
          <div class="text-xs text-muted">${pMes}%</div>
        </div>
      </div>
      ${progBar(pMes, 6)}
      <div class="plano-body" style="margin-top:10px">
        ${mes.acoes.map((acao,ai) => {
          const checked = concluidas.includes(ai);
          const cid = `plano-${mi}-${ai}`;
          return `<div class="plano-action${checked?' done':''}">
            <input type="checkbox" id="${cid}" ${checked?'checked':''} onchange="togglePlanoAcao(${mi},${ai},this.checked)">
            <label for="${cid}">${acao}</label>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  // Metas
  const metasHtml = D.metas.map((m, i) => {
    const hasVal = m.valor_alvo != null && m.valor_atual != null;
    const pMeta  = hasVal ? pct(m.valor_atual, m.valor_alvo) : null;
    const chips  = Object.keys(STATUS_LABELS).map(s =>
      `<span class="chip ${m.status===s?'s-'+s:''}" onclick="setMetaStatus(${i},'${s}')">${STATUS_LABELS[s]}</span>`
    ).join('');
    return `
    <div class="meta-card">
      <div class="flex-between" style="margin-bottom:10px">
        <div class="flex-center">
          <span style="font-size:26px">${m.emoji}</span>
          <div>
            <div class="font-semi">${m.nome}</div>
            <div class="text-xs text-muted">Prazo: ${fmtDate(m.prazo)}</div>
          </div>
        </div>
        ${hasVal ? `
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:700;color:var(--success)">${fmtCur(m.valor_atual, m.moeda)}</div>
          <div class="text-xs text-muted">de ${fmtCur(m.valor_alvo, m.moeda)}</div>
        </div>` : ''}
      </div>
      ${hasVal ? `${progBar(pMeta, 8)}
      <div class="flex-between mt-4" style="margin-bottom:8px">
        <span class="text-xs text-muted">${pMeta}%</span>
        <span class="text-xs text-muted">falta ${fmtCur(m.valor_alvo - m.valor_atual, m.moeda)}</span>
      </div>
      <div style="margin-bottom:6px">
        <label>Atualizar valor atual (${m.moeda})</label>
        <input class="input" type="number" value="${m.valor_atual}" onchange="setMetaValor(${i}, this.value)">
      </div>` : ''}
      <div class="status-chips">${chips}</div>
    </div>`;
  }).join('');

  // Timeline
  const timelineHtml = D.linha_do_tempo.map((item, i) => {
    const isOpen = expandedItems.has(i);
    return `
    <div class="timeline-item ${item.status}">
      <div class="timeline-main" onclick="toggleExpand(${i})">
        <div class="timeline-status" onclick="event.stopPropagation();cycleStatus(${i})">${STATUS_ICON[item.status]||'⏳'}</div>
        <div style="flex:1">
          <div class="timeline-periodo">${item.periodo}</div>
          <div class="timeline-acao">${item.acao}</div>
        </div>
        <div class="text-xs text-muted" style="flex-shrink:0;padding-top:2px">${isOpen?'▲':'▼'}</div>
      </div>
      <div class="timeline-expand${isOpen?' open':''}">
        ${item.detalhe || '<em>Sem detalhes adicionais.</em>'}
        <br>
        <button class="btn btn-sm btn-outline status-btn" onclick="cycleStatus(${i})">${STATUS_ICON[item.status]} → ${STATUS_NEXT_LABEL[item.status]}</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="countdown-card">
      <div class="countdown-eyebrow">🇪🇸 Valencia, Espanha</div>
      <div class="countdown-number">${days}</div>
      <div class="countdown-label">dias para o embarque</div>
      <div class="countdown-date">01 de março de 2028</div>
      <div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:7px">${cotacaoLabel()}</div>
    </div>

    <div class="section-title">Plano 90 Dias</div>
    <div class="tres-numeros">
      <div class="text-xs font-semi" style="color:var(--primary);margin-bottom:6px">3 NÚMEROS PARA ACOMPANHAR</div>
      <ul style="list-style:none">${p.tres_numeros.map(n=>`<li>${n}</li>`).join('')}</ul>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="text-xs text-muted font-semi">📆 DIA DE PAGAMENTO</div>
      <div class="font-semi mt-4" style="font-size:15px">${p.dia_pagamento}</div>
      <div class="text-xs text-muted mt-4">Transferir para Wise + Tesouro Selic antes de qualquer gasto.</div>
    </div>
    ${mesesHtml}

    <div class="section-title">Linha do Tempo</div>
    <div class="text-xs text-muted" style="margin-bottom:10px">Toque no ícone de status para alternar · Toque na linha para expandir</div>
    ${timelineHtml}

    <div class="section-title">Metas</div>
    ${metasHtml}
    <button class="btn btn-outline btn-full" style="margin-top:8px" onclick="exportJSON()">📥 Exportar dados (backup JSON)</button>
  `;
}

function toggleExpand(i) {
  if (expandedItems.has(i)) expandedItems.delete(i); else expandedItems.add(i);
  renderValencia();
}
function cycleStatus(i) {
  D.linha_do_tempo[i].status = STATUS_CYCLE[D.linha_do_tempo[i].status] || 'pendente';
  save(); renderValencia();
}
function setMetaValor(i, v) { D.metas[i].valor_atual = parseFloat(v) || 0; save(); }
function setMetaStatus(i, s) { D.metas[i].status = s; save(); renderValencia(); }
function togglePlanoAcao(mi, ai, checked) {
  const mes = D.plano_90_dias.meses[mi];
  if (!mes.concluidas) mes.concluidas = [];
  if (checked) { if (!mes.concluidas.includes(ai)) mes.concluidas.push(ai); }
  else mes.concluidas = mes.concluidas.filter(x => x !== ai);
  save(); renderValencia();
}

// ═══════════════════════════════════════════════════
//  AUTH — Supabase
// ═══════════════════════════════════════════════════
function mostrarToast(msg, tipo) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.className = 'toast toast-' + (tipo || 'info') + ' show';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

function toggleUserMenu() {
  const m = document.getElementById('user-menu');
  if (m) m.classList.toggle('open');
}
document.addEventListener('click', e => {
  const m = document.getElementById('user-menu');
  const btn = document.getElementById('user-btn');
  if (m && m.classList.contains('open') && !m.contains(e.target) && e.target !== btn) {
    m.classList.remove('open');
  }
});

function atualizarAvatar() {
  const btn = document.getElementById('user-btn');
  if (!btn || !currentUser) return;
  const nome = nomeUsuario(currentUser.email);
  btn.textContent = nome.charAt(0).toUpperCase();
  btn.style.display = 'flex';
  const el1 = document.getElementById('user-menu-nome');
  const el2 = document.getElementById('user-menu-email');
  if (el1) el1.textContent = nome;
  if (el2) el2.textContent = currentUser.email;
}

function showLoading(v) {
  const el = document.getElementById('loading-screen');
  if (el) el.style.display = v ? 'flex' : 'none';
}

function showLoginScreen() {
  document.getElementById('login-screen').style.display = 'flex';
  const days = Math.ceil((new Date('2028-03-01T00:00:00') - new Date().setHours(0,0,0,0)) / 86400000);
  const el = document.getElementById('login-days');
  if (el) el.textContent = days;
  setTimeout(() => document.getElementById('login-email')?.focus(), 100);
}

function concluirLogin() {
  showLoading(false);
  document.getElementById('login-screen').style.display = 'none';
  checkMesAporte();
  checkMesOrcamento();
  loadHabitos();
  initDots(); initSwipe();
  atualizarAvatar();
  const initId  = (location.hash || '#home').replace('#','');
  const initIdx = SCREEN_ORDER.indexOf(initId);
  goToScreen(initIdx >= 0 ? initIdx : 0, false);
  atualizarCotacao();
  initRealtime();
}

async function initApp() {
  showLoading(true);
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = { id: session.user.id, email: session.user.email };
      await carregarDados();
      concluirLogin();
    } else {
      showLoading(false);
      showLoginScreen();
    }
  } catch(err) {
    console.error('initApp error:', err);
    showLoading(false);
    showLoginScreen();
  }
}

async function doLogin() {
  const emailEl = document.getElementById('login-email');
  const senhaEl = document.getElementById('login-senha');
  const btn     = document.getElementById('login-btn');
  const err     = document.getElementById('login-error');
  const card    = document.querySelector('.login-card');
  if (!emailEl || !senhaEl) return;

  const email = emailEl.value.trim();
  const senha = senhaEl.value;
  if (!email || !senha) {
    err.textContent = 'Preencha email e senha.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true; btn.textContent = '⏳ Entrando...';
  err.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
  if (error) {
    btn.disabled = false; btn.textContent = '🔑 Entrar';
    err.textContent = 'Email ou senha incorretos.';
    err.style.display = 'block';
    card.classList.remove('login-shake');
    void card.offsetWidth;
    card.classList.add('login-shake');
    setTimeout(() => { err.style.display = 'none'; senhaEl.value = ''; senhaEl.focus(); }, 2800);
    return;
  }

  currentUser = { id: data.user.id, email: data.user.email };
  showLoading(true);
  await carregarDados();
  concluirLogin();
}

async function doLogout() {
  document.getElementById('user-menu').classList.remove('open');
  await sb.auth.signOut();
  currentUser = null;
  D = {}; H = {}; T = [];
  document.getElementById('user-btn').style.display = 'none';
  showLoginScreen();
}

async function esqueceuSenha() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { mostrarToast('Digite seu email primeiro', 'erro'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if (error) mostrarToast('Erro ao enviar email', 'erro');
  else mostrarToast('Email de recuperação enviado!', 'ok');
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
initApp();
window.addEventListener('hashchange', route);
</script>
